<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offload - Daily Check-In</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="authContainer">
        <div class="auth-card" style="background: #fef3c7; border: 1px solid #fbbf24; border-radius: 8px; padding: 16px; max-width: 800px; margin: 0 auto 20px;">
            <h3 style="margin-bottom: 8px; color: #92400e; font-size: 16px;">Sign In</h3>
            <div id="authForm" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                <input type="email" id="emailInput" placeholder="Email" style="padding: 8px 12px; border: 2px solid #d1d5db; border-radius: 6px; font-size: 14px;" />
                <input type="password" id="passwordInput" placeholder="Password" style="padding: 8px 12px; border: 2px solid #d1d5db; border-radius: 6px; font-size: 14px;" />
                <button onclick="handleLogin()" class="btn btn-primary" style="background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer;">Login</button>
                <button onclick="handleSignup()" class="btn btn-primary" style="background: #059669; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer;">Create Account</button>
                <a href="#" onclick="resetPassword(); return false;" style="font-size: 13px; color: #3b82f6; text-decoration: none; white-space: nowrap;">Forgot Password?</a>
            </div>
            <div id="authMessage" style="margin-top: 8px; color: #dc2626; font-size: 14px;"></div>
        </div>
    </div>

    <div id="app" style="display: none;">
        <div class="container">
            <!-- Main content will be rendered here -->
            <div id="mainContent"></div>

            <!-- Logout -->
            <div class="card" style="text-align: center; padding: 12px; border: 1px solid #dc2626;">
                <button onclick="handleLogout()" class="btn" style="width: 100%; padding: 10px 20px; background: #dc2626; color: white;">🚪 Logout</button>
            </div>

            <!-- Entries Section -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px;">
                    <h2 style="margin: 0;">Saved Check-Ins (<span id="entryCount">0</span>)</h2>
                    <div style="display: flex; gap: 6px; align-items: center;">
                        <span style="font-size: 14px; font-weight: 600;">📋 Copy Last</span>
                        <input type="number" id="exportCount" value="20" min="1" style="width: 60px; padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px;">
                        <select id="exportType" style="padding: 6px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 14px; background: white;">
                            <option value="entries">Entries</option>
                            <option value="days">Days</option>
                        </select>
                        <button onclick="exportEntries()" class="btn" style="background: #3b82f6; color: white; padding: 8px 16px; white-space: nowrap;">Copy (CSV)</button>
                    </div>
                </div>
                <div id="entriesContainer"></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA89BZxelKRoK64JnYtSdWUho2WUfWymII",
            authDomain: "capacity-monitor.firebaseapp.com",
            projectId: "capacity-monitor",
            storageBucket: "capacity-monitor.firebasestorage.app",
            messagingSenderId: "455641716280",
            appId: "1:455641716280:web:5848888e290e47114c78cd",
            measurementId: "G-CGR5R0D1SP"
        };

        window.firebaseApp = initializeApp(firebaseConfig);
        window.auth = getAuth(window.firebaseApp);
        window.db = getFirestore(window.firebaseApp);
    </script>

    <!-- App Scripts -->
    <script src="state.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="firestore.js"></script>
    <script src="calculations.js"></script>
    <script src="visualization.js"></script>
    <script src="render.js"></script>
    <script src="sliders.js"></script>
    <script src="life-areas-editor.js"></script>
    <script src="entries.js"></script>

    <!-- Privacy/Terms Footer -->
    <div style="text-align: center; padding: 2rem 0 1rem; font-size: 14px; color: #6b7280; border-top: 1px solid #e5e7eb; margin-top: 2rem;">
        <a href="https://offload---self-help-tools.web.app/#privacy" style="color: #2563eb; text-decoration: none; margin: 0 1rem;">Privacy Policy</a>
        <span>|</span>
        <a href="https://offload---self-help-tools.web.app/#terms" style="color: #2563eb; text-decoration: none; margin: 0 1rem;">Terms of Service</a>
    </div>
</body>
</html>
